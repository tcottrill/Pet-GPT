[input]
; SNES user-port adapter / gamepad support.
; snes_adapter: 1 = emulate the SNES adapter on the VIA user port (gamepad input),
;               0 = disabled (user port idles "released").
snes_adapter=1
; snes_invert: 0 = active-low DATA (real SNES controller; pet-invaders).
;              1 = inverted DATA (pressed = high; PETSCII Robots-style adapter).
snes_invert=0
; graphics_kbd: 1 = Shift+letter types PET graphics chars (Machine > Graphics
; Keyboard, or F12; saved automatically). 0 = business typing.
graphics_kbd=1
[machine]
; System ROM set: 2 = BASIC 2.0, 4 = BASIC 4.0, 8 = 8032 80-column (Machine menu).
basic=2
; RAM size in KB: 4 / 8 / 16 / 32 (Machine > Memory). Default 32.
ram=32

speed2x=0
[paths]
lastromdir=C:\Source2026\Pet-GPT-2026\x64\Release\files\
[video]
; Window scale preset: 0 = Fit (free resize), 1/2/3 = integer 1x/2x/3x.
scale=1
; Start in fullscreen: 0 = windowed, 1 = fullscreen (toggle with Alt+Enter / F11).
fullscreen=False
; CRT look: black-and-white / green-screen monitor simulation (single-pass
; shader: horizontal softness + halation glow + phosphor tint).
; Toggle with View > CRT / F10. crt: 0 = off (pixel-sharp passthrough), 1 = on.
crt=1
; crt_tint: 1 = green phosphor tint, 0 = black & white (View > Monitor; saved automatically).
crt_tint=1
; Live tuning while running: F9 selects a knob, PgUp/PgDn adjust it (Shift =
; coarse steps), F8 dumps all current values to the log as a paste-ready block.
; mono_blur_h: horizontal softness (video bandwidth), in PET pixels, 0..2.5.
mono_blur_h=0.8
; mono_blur_v: vertical beam-spot softness, in PET pixels, 0..1.
mono_blur_v=0.35
; mono_halation: glow bleed around bright areas, 0..1.
mono_halation=0.15
; mono_halation_radius: glow radius in PET pixels, 1..16.
mono_halation_radius=4
; mono_scanline: soft raster-line ripple, 0..1. Default 0 (off) -- if used at
; all on a mono monitor it should stay subtle (~0.1-0.2).
mono_scanline=0
; mono_contrast: video gain (beam overdrive), 1..3. Above 1 the beam spot
; saturates wider, so text gets FATTER without getting blurrier -- the
; "brightness turned up" look of early tubes. For very fat strokes raise
; mono_blur_h a touch as well. 1.0 = neutral.
mono_contrast=1.2
; mono_brightness: black-level lift, 0..0.25. Raises the dark background into
; a faint phosphor glow (misadjusted-tube look). 0 = neutral.
mono_brightness=0

