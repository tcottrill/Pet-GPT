[input]
; SNES user-port adapter / gamepad support.
; snes_adapter: 1 = emulate the SNES adapter on the VIA user port (gamepad input),
;               0 = disabled (user port idles "released").
snes_adapter=1
; snes_invert: 0 = active-low DATA (real SNES controller; pet-invaders).
;              1 = inverted DATA (pressed = high; PETSCII Robots-style adapter).
snes_invert=0
[machine]
; System ROM set: 2 = BASIC 2.0, 4 = BASIC 4.0 (also selectable from the Machine menu).
basic=2
; RAM size in KB: 4 / 8 / 16 / 32 (Machine > Memory). Default 32.
ram=32

[paths]
lastromdir=./files
[video]
; Window scale preset: 0 = Fit (free resize), 1/2/3 = integer 1x/2x/3x.
scale=2
; Start in fullscreen: 0 = windowed, 1 = fullscreen (toggle with Alt+Enter / F11).
fullscreen=False
; CRT look (green phosphor tint; the PET had a mono green screen, no shadow mask).
; Toggle with View > CRT / F10. crt: 0 = off (plain passthrough), 1 = on.
crt=1
; crt_tint: 1 = apply phosphor-green tint to the (monochrome) PET image, 0 = no tint.
crt_tint=1
; crt_scanline_strength: brightness of the dim scanline rows, 0.0..1.0.
; Lower = darker gaps / stronger scanlines (0.55 default).
crt_scanline_strength=0.55
; --- Scanlines: CURRENTLY DISABLED (kept for a future proper VICE CRT shader) ---
; crt_grille_pitch: scanline SPACING in framebuffer ROWS (PET renders 640x400 =
; 200 raster lines x2). 2 = one scanline per raster line (scales with the image).
crt_grille_pitch=2
; crt_grille_thickness: dark-line THICKNESS in SCREEN pixels -- fixed, so lines stay
; the same crisp weight at 2x or 4K (never chunky). ~2.5 default; lower = thinner.
crt_grille_thickness=2.5

